<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fiona Huang</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      cursor: crosshair;
    }

    canvas {
      display: block;
    }

    #note {
      position: fixed;
      left: 22px;
      bottom: 18px;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 0.04em;
      opacity: 0.55;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="note">click anywhere to switch effect</div>
  <script src="sketch.js"></script>
</body>
</html>
