<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Fiona Typeface Interaction</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f4f1e8;
      cursor: grab;
    }

    body:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
    }

    @font-face {
      font-family: "FionaNewTestament";
      src: url("Fiona New Testament.otf");
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 28px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: #111;
      z-index: 10;
      mix-blend-mode: difference;
      color: white;
    }
  </style>
</head>

<body>
  <div class="hint">DRAG / MOVE / CLICK</div>

<script>
let font;
let phrases = [
  "FIONA",
  "NEW TESTAMENT",
  "TYPE THAT MOVES",
  "DRAG TO READ",
  "EVERYTHING YOU WANT",
  "WANTS ME ALREADY"
];

let currentPhrase = 0;

let xOffset = 0;
let targetXOffset = 0;
let waveAmount = 0;
let targetWaveAmount = 0;

let stretch = 1;
let targetStretch = 1;

let bgColors = ["#f4f1e8", "#111111", "#ff4f00", "#c6ff00", "#8fd3ff"];
let textColors = ["#111111", "#f4f1e8", "#111111", "#111111", "#111111"];
let colorIndex = 0;

function preload() {
  font = loadFont("Fiona New Testament.otf");
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  textFont(font);
  textAlign(CENTER, CENTER);
}

function draw() {
  background(bgColors[colorIndex]);

  xOffset = lerp(xOffset, targetXOffset, 0.08);
  waveAmount = lerp(waveAmount, targetWaveAmount, 0.08);
  stretch = lerp(stretch, targetStretch, 0.08);

  let phrase = phrases[currentPhrase];

  let size = min(width * 0.16, 160);
  textSize(size);

  fill(textColors[colorIndex]);
  noStroke();

  let spacing = size * 0.72;
  let totalWidth = phrase.length * spacing;

  push();
  translate(width / 2 + xOffset, height / 2);

  for (let i = 0; i < phrase.length; i++) {
    let char = phrase[i];

    let x = i * spacing - totalWidth / 2;
    let y = sin(frameCount * 0.04 + i * 0.7) * waveAmount;

    let scaleY = stretch + sin(frameCount * 0.03 + i) * 0.12;
    let rotateAmount = sin(frameCount * 0.025 + i) * map(waveAmount, 0, 80, 0, 0.18);

    push();
    translate(x, y);
    rotate(rotateAmount);
    scale(1, scaleY);
    text(char, 0, 0);
    pop();
  }

  pop();

  targetWaveAmount = map(mouseY, 0, height, 90, 0);
  targetStretch = map(mouseX, 0, width, 0.55, 1.9);
}

function mouseDragged() {
  targetXOffset += movedX * 1.8;
}

function mouseMoved() {
  targetXOffset = map(mouseX, 0, width, -80, 80);
}

function mousePressed() {
  currentPhrase = (currentPhrase + 1) % phrases.length;
  colorIndex = (colorIndex + 1) % bgColors.length;
  targetWaveAmount = random(20, 100);
  targetStretch = random(0.6, 1.8);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
